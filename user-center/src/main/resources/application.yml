server:
  # Honour X-Forwarded-* headers from the upstream reverse proxy so that
  # request.isSecure() / scheme reflect the actual TLS-terminated client
  # connection. Required for HSTS, Secure cookies, and any OAuth2 redirect
  # construction to behave correctly behind the proxy.
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        # SameSite=Lax keeps the SESSION cookie attached on top-level
        # navigations (e.g. OAuth2 client -> /oauth2/authorize redirects)
        # while blocking it on cross-site sub-resource requests. Strict
        # would break OAuth2 cross-site redirects and is not adopted.
        same-site: lax
        # Production is HTTPS-only; the local profile overrides this to
        # false so that http://localhost can still authenticate.
        secure: true
        http-only: true

spring:
  application:
    name: user-center
  web:
    error:
      include-stacktrace: always
      include-message: always
      include-exception: true
  datasource:
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:euler_uc}?characterEncoding=utf8
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        timezone:
          default_storage: NORMALIZE_UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  messages:
    basename: classpath*:language/**/*
    use-code-as-default-message: true
  security:
    oauth2:
      authorizationserver:
        issuer: https://account.eulerproject.org
        client:
          default:
            require-proof-key: true
            require-authorization-consent: true
            registration:
              client-id: default
              client-authentication-methods: none
              authorization-grant-types:
                - authorization_code
              scopes:
                - openid
              redirect-uris:
                - https://example.com/code
            token:
              access-token-time-to-live: 7d
          admin:
            require-proof-key: true
            registration:
              client-id: admin
              client-secret: '{noop}admin'
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - https://admin.eulerproject.org/auth/callback
              scopes:
                - openid
                - profile
                - email
                - phone
                - authorities
              post-logout-redirect-uris:
                - https://admin.eulerproject.org
            token:
              access-token-time-to-live: 5m
              refresh-token-time-to-live: 7d
              reuse-refresh-tokens: false

euler:
  application:
    runtime-path: @basedir@/var/run
    temp-path: @basedir@/var/tmp
  copyright:
    holder:
      website: 'https://www.eulerproject.io'
      name: 'Euler Projects'
  web:
    site:
      name: 'Euler Projects'
    page:
      show-stack-trace: true
  security:
    web:
      enabled: true
      endpoint:
        csrf:
          enabled: true
        user:
          login-page: /signin
          login-processing-url: /doLogin
          logout-page: /signout
          logout-processing-url: /doLogout
        password:
          enabled: true
          change-password-page: /change-pw
          change-password-processing-url: /doChangePw
        signup:
          enabled: true
          signup-page: /create-account
          signup-processing-url: /doSignup
    oauth2:
      authorizationserver:
        authorization-store-type: redis
        redis-key-prefix: 'euler:oauth2:auth'
      resourceserver:
        url-patterns:
          - /api/**
    otp:
      enabled: true
      storage: redis                      # in-memory | jdbc | redis (复用现有 spring.data.redis)
      # issue-endpoint-uri: /otp/tickets  # 默认值，可省
      # policy:                           # 默认 6 位 / 5分钟 / 60s / 5 次，如需调整可解锁
      #   otp-length: 6
      #   expires-in: 5m
      #   retry-after: 60s
      #   max-failures: 5
