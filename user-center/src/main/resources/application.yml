spring:
  application:
    name: user-center
  web:
    error:
      include-stacktrace: always
      include-message: always
      include-exception: true
  datasource:
    url: jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:euler_uc}?characterEncoding=utf8
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        timezone:
          default_storage: NORMALIZE_UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  messages:
    basename: classpath*:language/**/*
    use-code-as-default-message: true
  security:
    oauth2:
      authorizationserver:
        issuer: https://account.eulerproject.org
        client:
          default:
            require-proof-key: true
            require-authorization-consent: true
            registration:
              client-id: default
              client-authentication-methods: none
              authorization-grant-types:
                - authorization_code
              scopes:
                - openid
              redirect-uris:
                - https://example.com/code
            token:
              access-token-time-to-live: 7d
          admin:
            require-proof-key: true
            registration:
              client-id: admin
              client-secret: '{noop}admin'
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - https://admin.eulerproject.org/auth/callback
              scopes:
                - openid
                - profile
                - email
                - phone
                - authorities
              post-logout-redirect-uris:
                - https://admin.eulerproject.org
            token:
              access-token-time-to-live: 5m
              refresh-token-time-to-live: 7d
              reuse-refresh-tokens: false

euler:
  application:
    runtime-path: @basedir@/var/run
    temp-path: @basedir@/var/tmp
  copyright:
    holder:
      website: 'https://www.eulerproject.io'
      name: 'Euler Projects'
  web:
    site:
      name: 'Euler Projects'
    page:
      show-stack-trace: true
  security:
    web:
      enabled: true
      endpoint:
        csrf:
          enabled: true
        user:
          login-page: /signin
          login-processing-url: /doLogin
          logout-page: /signout
          logout-processing-url: /doLogout
        password:
          enabled: true
          change-password-page: /change-pw
          change-password-processing-url: /doChangePw
        signup:
          enabled: true
          signup-page: /create-account
          signup-processing-url: /doSignup
    oauth2:
      authorizationserver:
        authorization-store-type: redis
        redis-key-prefix: 'euler:oauth2:auth'
        jwk:
          # Pre-configured keys, keyed by kid. With a JwkManageService bean
          # present (this deployment ships DefaultJwkManageService) each entry
          # is upserted into the persistent backend on startup, giving every
          # node a known baseline while live rotations happen through the
          # admin API.
          keys:
            demo-key-0:
              alg: RS256                           # RS256/RS384/RS512/ES256/ES384/ES512 (Ed25519 PEM not supported)
              use: sig
              status: ACTIVE                       # PENDING / ACTIVE / DEPRECATED / VERIFY_ONLY / RETIRED
              iat: "2026-01-01T00:00:00Z"
              pem: file:@basedir@/jwk/keys/demo.pem
          manager:
            type: clustered
            cluster:
              heartbeat-interval: 15s
              heartbeat-ttl: 60s
              safety-reload-interval: 5m
              redis:
                namespace: 'euler:oauth2:jwk'
      resourceserver:
        url-patterns:
          - /api/**
  uc:
    oauth2:
      jwk:
        encryption:
          # KEK identifier recorded in the enc_kid column; must change together
          # with the KEK itself on rotation.
          enc-kid: default
          # Development-only: derive the KEK from a passphrase via PBKDF2.
          # Production deployments MUST switch to source=KEY_FILE with a
          # 32-byte binary KEK file protected by POSIX 0600 permissions.
          source: passphrase
          passphrase: dev-secret
